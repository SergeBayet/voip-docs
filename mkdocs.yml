site_name: VoIP Documentation
site_description: Shared documentation about VoIP, SIP, Asterisk, Wazo, WebRTC and Odoo VoIP
site_url: https://YOUR_ORG_OR_USER.github.io/voip-docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Media:
      - Codecs: media/codecs.md
  - SIP:
      - SIP Trunk Configuration: sip/trunk.md
  - Asterisk: asterisk.md
  - Wazo: wazo.md
  - Debugging: debugging.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
