site_name: VoIP Documentation
site_description: Shared documentation about VoIP, SIP, Asterisk, Wazo, WebRTC and Odoo VoIP
site_url: https://sergebayet.github.io/voip-docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/flame-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

plugins:
  - search
  - include-markdown

# Local-only working docs that are intentionally not part of the published site:
# - superpowers/  : gitignored design specs/plans (and contain Jinja-like
#                   directives that the include-markdown plugin would choke on).
# - kamailio/_test/: internal P0 verification runbook + sipexer templates.
# - course/*.md   : the course's own authoring/maintenance notes (README, NOTES,
#                   MISSION, RESOURCES) — kept in the repo for maintainers, not the site.
#                   The reader-facing course is the self-contained HTML under course/.
exclude_docs: |
  superpowers/
  kamailio/_test/
  course/*.md
  course/reference/build_onboarding.py

nav:
  - Home: index.md
  - Onboarding Course: course-overview.md
  - Media:
      - Codecs: media/codecs.md
      - SDP: media/sdp.md
      - RTP profiles: media/rtp_profiles.md
  - SIP:
      - SIP Trunk Configuration: sip/trunk.md
  - Wazo:
      - Installation and upgrade: wazo.md
      - Plugin development: wazo/plugins.md
  - Kamailio:
      - Installation: kamailio/installation.md
      - Configuration: kamailio/configuration.md
  - Odoo IAP Phone Service:
      - Configuration: phone_service/configuration.md
  - Swiss Knives:
      - Troubleshooting Tools: swiss-knives/troubleshoot.md
      - HOMER Setup: swiss-knives/homer.md
  - Awesome Resources: resources.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
