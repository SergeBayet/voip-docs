site_name: VoIP Documentation
site_description: Shared documentation about VoIP, SIP, Asterisk, Wazo, WebRTC and Odoo VoIP
site_url: https://sergebayet.github.io/voip-docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/flame-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

plugins:
  - search
  - include-markdown

nav:
  - Home: index.md
  - Media:
      - Codecs: media/codecs.md
      - SDP: media/sdp.md
      - RTP profiles: media/rtp_profiles.md
  - SIP:
      - SIP Trunk Configuration: sip/trunk.md
  - Asterisk: asterisk.md
  - Wazo: wazo.md
  - Debugging: debugging.md
  - Kamailio:
      - Installation: kamailio/installation.md
  - Swiss Knives:
      - Troubleshooting Tools: swiss-knives/troubleshoot.md
      - HOMER Setup: swiss-knives/homer.md
  - Awesome Resources: resources.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
