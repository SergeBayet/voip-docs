global
    log /dev/log local0
    maxconn 20000
    tune.ssl.default-dh-param 2048

defaults
    mode tcp
    timeout connect 5s
    timeout client  1h          # long: WebSocket connections are persistent
    timeout server  1h
    option tcplog

frontend wss_in
    bind :443 ssl crt /etc/haproxy/certs/voip.odoo.com.pem
    # Browsers speak WSS (TLS). After termination we have plain ws frames.
    default_backend kamailio_ws

backend kamailio_ws
    # send-proxy-v2 makes HAProxy prepend the PROXY protocol header so Kamailio
    # (tcp_accept_haproxy=yes) learns the real client IP.
    server edge01 127.0.0.1:8080 send-proxy-v2
