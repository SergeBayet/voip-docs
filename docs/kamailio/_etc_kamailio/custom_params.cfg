/* These parameters can be modified at runtime via RPC interface
 * - see the documentation of 'cfg_rpc' module.
 *
 * Format: group.id = value 'desc' description
 * Access: $sel(cfg_get.group.id) or @cfg_get.group.id */

# ===== Edge environment parameters (replace per deployment) =====

# This node's address advertised to Wazo/Telnyx (FQDN or IP routable from them).
#!subst "/UDP_ADVERTISE_ADDR/edge01.voip.odoo.com/"

# IAP Services base URL (same LAN, expected fast).
#!define IAP_BASE_URL "http://iap-services.internal:8000/voip"

# Telnyx single connection (v0): signalling target + trusted source IP(s).
#!define TELNYX_SIP_TARGET "sip:sip.telnyx.com:5060;transport=udp"
#!define TELNYX_SRC_IP_1   "203.0.113.10"
#!define TELNYX_SRC_IP_2   "203.0.113.11"

# Wazo trunk trusted source IP (the per-region Wazo edge IP).
#!define WAZO_SRC_IP "198.51.100.20"

# Fallback Wazo if IAP lookup yields none (bring-up convenience).
#!define WAZO_FALLBACK_FQDN "eu-voip-pbx01-a.odoo.com"

#!ifdef WITH_PSTN
/* PSTN GW Routing
 *
 * - pstn.gw_ip: valid IP or hostname as string value, example:
 * pstn.gw_ip = "10.0.0.101" desc "My PSTN GW Address"
 *
 * - by default is empty to avoid misrouting */
pstn.gw_ip = "" desc "PSTN GW Address"
pstn.gw_port = "" desc "PSTN GW Port"
#!endif

#!ifdef WITH_VOICEMAIL
/* VoiceMail Routing on offline, busy or no answer
 *
 * - by default Voicemail server IP is empty to avoid misrouting */
voicemail.srv_ip = "" desc "VoiceMail IP Address"
voicemail.srv_port = "5060" desc "VoiceMail Port"
#!endif
