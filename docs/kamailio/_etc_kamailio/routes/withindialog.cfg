# withindialog.cfg — sequential (in-dialog) requests.
route[WITHINDLG] {
    if (!has_totag()) return;

    if (loose_route()) {
        # If the next hop is a WS browser, route back over its socket.
        if ($du == "" && (proto == WS || proto == WSS)) {
            handle_ruri_alias();
        }
        route(RELAY);
        exit;
    }

    if (is_method("ACK")) {
        if (t_check_trans()) { route(RELAY); exit; }
        else { exit; }
    }
    sl_send_reply("404", "Not here");
    exit;
}
