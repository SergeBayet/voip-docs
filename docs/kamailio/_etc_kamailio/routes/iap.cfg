# iap.cfg — IAP Services REST lookups with in-RAM caching (no DB).
# On success sets $var(iap_json) to the JSON body and returns 1.
# On "not found" (negative cache) returns -1. On hard error returns -2.

route[IAP_BY_NUMBER] {
    # Argument passed in $var(iap_arg) = E.164 number to resolve.
    # (This Kamailio build's core parser does not accept route(NAME, "param");
    #  callers set $var(iap_arg) before the call.)
    $var(num) = $var(iap_arg);

    # 1) cache hit?
    if ($sht(iapcache=>$var(num)) != $null) {
        $var(iap_json) = $sht(iapcache=>$var(num));
        if ($var(iap_json) == "NEG") { return -1; }   # negative cache
        return 1;
    }

    # 2) cache miss → REST call (synchronous, short timeout via http_client cfg)
    $var(url) = IAP_BASE_URL + "/number/" + $var(num);
    $var(rc) = http_client_query("$var(url)", "$var(body)");

    if ($var(rc) == 200) {
        $sht(iapcache=>$var(num)) = $var(body);
        $var(iap_json) = $var(body);
        return 1;
    }
    if ($var(rc) == 404) {
        # negative cache for a short while (override default TTL via the helper below)
        $sht(iapcache=>$var(num)) = "NEG";
        return -1;
    }
    xlog("L_WARN", "IAP_BY_NUMBER: lookup failed num=$var(num) rc=$var(rc)\n");
    return -2;
}

route[IAP_BY_USER] {
    # Argument passed in $var(iap_arg) = SIP username (unique cross-tenant).
    $var(user) = $var(iap_arg);

    if ($sht(usercache=>$var(user)) != $null) {
        $var(pbx_fqdn) = $sht(usercache=>$var(user));
        if ($var(pbx_fqdn) == "NEG") { return -1; }
        return 1;
    }

    $var(url) = IAP_BASE_URL + "/user/" + $var(user);
    $var(rc) = http_client_query("$var(url)", "$var(body)");

    if ($var(rc) == 200) {
        jansson_get("pbx_fqdn", "$var(body)", "$var(pbx_fqdn)");
        if ($var(pbx_fqdn) == $null || $var(pbx_fqdn) == "") {
            xlog("L_WARN", "IAP_BY_USER: no pbx_fqdn for user=$var(user)\n");
            return -2;
        }
        $sht(usercache=>$var(user)) = $var(pbx_fqdn);
        return 1;
    }
    if ($var(rc) == 404) {
        $sht(usercache=>$var(user)) = "NEG";
        return -1;
    }
    xlog("L_WARN", "IAP_BY_USER: lookup failed user=$var(user) rc=$var(rc)\n");
    return -2;
}
