# request_main.cfg — top-level edge request routing.
request_route {
    # 1) Per-request sanity, max-forwards, anti-flood, WS aliasing.
    route(REQINIT);

    # 2) CANCEL: pass to the matching transaction.
    if (is_method("CANCEL")) {
        if (t_check_trans()) t_relay();
        exit;
    }

    # 3) In-dialog (has To-tag): route by the message itself (stateless).
    if (has_totag()) {
        route(WITHINDLG);
        exit;
    }

    # 4) Absorb retransmissions of initial requests.
    if (!is_method("ACK")) t_check_trans();

    # 5) REGISTER (browsers only) → relay to Wazo.
    if (is_method("REGISTER")) {
        route(REGISTER_EDGE);
        exit;
    }

    # 6) Classify the source and dispatch initial requests.
    if (route(FROM_TELNYX) > 0) {
        route(INBOUND_FROM_TELNYX);
        exit;
    }
    if (route(FROM_WAZO) > 0) {
        route(OUTBOUND_TO_TELNYX);
        exit;
    }
    if (route(FROM_WS) > 0) {
        # Browser-originated INVITE → send to the user's Wazo (dialplan applies there).
        $var(iap_arg) = $fU;
        route(IAP_BY_USER);
        if ($rc == 1) { $var(pbx) = $var(pbx_fqdn); }
        else { $var(pbx) = WAZO_FALLBACK_FQDN; }
        record_route();
        $du = "sip:" + $var(pbx) + ":5060;transport=udp";
        route(RELAY);
        exit;
    }

    # 7) Unknown source.
    sl_send_reply("403", "Forbidden");
    exit;
}
