# outbound.cfg — calls arriving from Wazo (B2BUA), destined to the PSTN via Telnyx.
route[OUTBOUND_TO_TELNYX] {
    if (!is_method("INVITE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # Trust the tenant asserted by Wazo (IP-authenticated trunk). NEVER the From.
    $var(tenant) = $hdr(X-Tenant-ID);
    if ($var(tenant) == $null || $var(tenant) == "") {
        sl_send_reply("403", "Missing tenant assertion");
        exit;
    }

    # Presented caller ID (the number the call wants to show).
    $var(cli) = $fU;

    # Resolve ownership/authorisation of that CLI via IAP.
    $var(rc) = route(IAP_BY_NUMBER, "$var(cli)");
    if ($var(rc) == -2) {
        sl_send_reply("503", "Routing service unavailable");
        exit;
    }

    if ($var(rc) == 1) {
        jansson_get("tenant_id",      "$var(iap_json)", "$var(owner)");
        jansson_get("account_active", "$var(iap_json)", "$var(active)");

        # Credit gate for the calling tenant.
        if ($var(active) != "true" && $var(active) != "1") {
            sl_send_reply("403", "Account inactive");
            exit;
        }

        # CLI must belong to the asserting tenant; otherwise normalise it.
        if ($var(owner) != $var(tenant)) {
            xlog("L_NOTICE", "OUTBOUND: CLI $var(cli) not owned by tenant $var(tenant); normalising\n");
            route(SET_DEFAULT_CLI);
        }
    } else {
        # Unknown CLI → not ours; normalise to the tenant default.
        route(SET_DEFAULT_CLI);
    }

    record_route();
    $du = TELNYX_SIP_TARGET;
    route(RELAY);
    exit;
}

# Replace the From user with the tenant's default DID.
# P0: a single configured default; P1: fetch the tenant default from IAP.
route[SET_DEFAULT_CLI] {
    jansson_get("default_cli", "$var(iap_json)", "$var(defcli)");
    if ($var(defcli) == $null || $var(defcli) == "") {
        sl_send_reply("403", "No authorised caller ID");
        exit;
    }
    uac_replace_from("", "sip:" + $var(defcli) + "@$fd");
}
