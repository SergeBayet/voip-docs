# outbound.cfg — calls arriving from Wazo (B2BUA), destined to the PSTN via Telnyx.
route[OUTBOUND_TO_TELNYX] {
    if (!is_method("INVITE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # Trust the tenant asserted by Wazo (IP-authenticated trunk). NEVER the From.
    $var(tenant) = $hdr(X-Tenant-ID);
    if ($var(tenant) == $null || $var(tenant) == "") {
        sl_send_reply("403", "Missing tenant assertion");
        exit;
    }

    # Presented caller ID (the number the call wants to show).
    $var(iap_arg) = $fU;
    route(IAP_BY_NUMBER);
    if ($rc == -2) {
        sl_send_reply("503", "Routing service unavailable");
        exit;
    }

    if ($rc == 1) {
        jansson_get("tenant_id",      "$var(iap_json)", "$var(owner)");
        jansson_get("account_active", "$var(iap_json)", "$var(active)");

        # Credit gate for the calling tenant.
        if ($var(active) != "true" && $var(active) != "1") {
            sl_send_reply("403", "Account inactive");
            exit;
        }

        # CLI must belong to the asserting tenant; otherwise reject (P1: replace with tenant default).
        if ($var(owner) != $var(tenant)) {
            sl_send_reply("403", "Caller ID not authorised for tenant");
            exit;
        }
        # Owned by the asserting tenant — allowed, continue.
    } else {
        # $rc == -1: unknown CLI — reject (P0 decision; P1 will add replacement-with-tenant-default).
        sl_send_reply("403", "Unknown caller ID");
        exit;
    }

    record_route();
    $du = TELNYX_SIP_TARGET;
    route(RELAY);
    exit;
}

# P1: CLI replacement-with-tenant-default (when CLI is unknown or belongs to another tenant)
# requires a tenant-keyed IAP lookup and is deferred to P1.
