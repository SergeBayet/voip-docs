# register.cfg — relay REGISTER to the tenant's Wazo. Auth is delegated to Wazo
# (we pass the 401 challenge straight through). We do NOT store location locally.
route[REGISTER_EDGE] {
    if (!is_method("REGISTER")) return;

    # Only browsers register here.
    if (route(FROM_WS) < 0) {
        sl_send_reply("403", "Registration only over WebSocket");
        exit;
    }

    # Resolve which Wazo serves this user (username unique cross-tenant).
    $var(iap_arg) = $fU;
    route(IAP_BY_USER);
    if ($rc == 1) {
        $var(pbx) = $var(pbx_fqdn);
    } else {
        # bring-up fallback so we can test before IAP is live
        $var(pbx) = WAZO_FALLBACK_FQDN;
        xlog("L_NOTICE", "REGISTER: no IAP mapping for $fU, using fallback $var(pbx)\n");
    }

    # Insert Path pointing to THIS node so inbound calls to the browser return here.
    add_path_received();

    # Send to the tenant's Wazo; auth challenge flows back to the browser untouched.
    $du = "sip:" + $var(pbx) + ":5060;transport=udp";
    route(RELAY);
    exit;
}
