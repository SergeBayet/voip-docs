# ws.cfg — accept the WebSocket upgrade from browsers (via HAProxy, plain ws).

event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();

    if ($hdr(Upgrade) =~ "websocket" && $hdr(Connection) =~ "Upgrade" && $rm == "GET") {
        if (ws_handle_handshake()) {
            # handshake done; SIP-over-WS frames now flow into request_route
            exit;
        }
    }
    xhttp_reply("404", "Not Found", "", "");
}
