# trunks.cfg — classify the source of a request by IP (IP-auth, no DB).

# Returns true and sets FLT_FROMTELNYX if the request comes from Telnyx.
route[FROM_TELNYX] {
    if ($si == TELNYX_SRC_IP_1 || $si == TELNYX_SRC_IP_2) {
        setflag(FLT_FROMTELNYX);
        return 1;
    }
    return -1;
}

# Returns true and sets FLT_FROMWAZO if the request comes from a Wazo trunk.
route[FROM_WAZO] {
    if ($si == WAZO_SRC_IP) {
        setflag(FLT_FROMWAZO);
        return 1;
    }
    return -1;
}

# Returns true if the request arrived over WebSocket (browser).
route[FROM_WS] {
    if (proto == WS || proto == WSS) {
        setflag(FLT_FROMWS);
        return 1;
    }
    return -1;
}
