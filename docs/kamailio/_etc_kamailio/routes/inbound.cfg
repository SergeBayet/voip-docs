# inbound.cfg — calls arriving from Telnyx, destined to a tenant's number.
route[INBOUND_FROM_TELNYX] {
    if (!is_method("INVITE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # Called number = R-URI user (E.164).
    $var(dnis) = $rU;

    $var(iap_arg) = $var(dnis);
    route(IAP_BY_NUMBER);
    if ($rc == -1) {
        sl_send_reply("404", "Unknown number");
        exit;
    }
    if ($rc == -2) {
        sl_send_reply("503", "Routing service unavailable");
        exit;
    }

    # Parse routing fields from the cached JSON.
    jansson_get("pbx_fqdn",       "$var(iap_json)", "$var(pbx)");
    jansson_get("account_active", "$var(iap_json)", "$var(active)");
    jansson_get("tenant_id",      "$var(iap_json)", "$var(tenant)");

    # Optional cross-check with Telnyx X-Tags.
    if ($hdr(X-Tags) != $null && $hdr(X-Tags) != $var(tenant)) {
        xlog("L_WARN", "INBOUND: X-Tags=$hdr(X-Tags) != IAP tenant=$var(tenant) for $var(dnis)\n");
    }

    # Credit / account gate.
    if ($var(active) != "true" && $var(active) != "1") {
        sl_send_reply("403", "Account inactive");
        exit;
    }
    if ($var(pbx) == $null || $var(pbx) == "") {
        sl_send_reply("404", "No PBX for number");
        exit;
    }

    # Stamp ourselves into the path (double Record-Route bridges UDP<->WS later).
    record_route();

    $du = "sip:" + $var(pbx) + ":5060;transport=udp";
    route(RELAY);
    exit;
}
